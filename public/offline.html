<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sem conexão — Empresa Louzada</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <style>
      * { box-sizing: border-box; margin: 0; }
      body {
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        background: #191d24;
        color: #eef0f3;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }
      .card { max-width: 420px; }
      .mark {
        width: 64px; height: 64px; margin: 0 auto 20px;
        display: flex; align-items: center; justify-content: center;
        background: #164a88; border-radius: 14px;
      }
      h1 { font-size: 1.5rem; margin-bottom: 10px; }
      p { color: #c7ccd6; line-height: 1.5; }
      a {
        display: inline-block; margin-top: 22px; padding: 12px 22px;
        background: #db2828; color: #fff; text-decoration: none;
        border-radius: 8px; font-weight: 700;
      }
      .barra { height: 5px; background: repeating-linear-gradient(90deg,#db2828 0 30px,transparent 30px 56px); margin-top: 28px; border-radius: 3px; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="mark">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 17V7a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v10" />
          <path d="M2 17h20" /><circle cx="7" cy="19" r="1.5" /><circle cx="17" cy="19" r="1.5" /><path d="M4 11h16" />
        </svg>
      </div>
      <h1>Você está sem conexão</h1>
      <p>Não foi possível carregar esta página agora. As páginas que você já abriu continuam disponíveis offline — tente voltar a uma delas.</p>
      <a href="/horarios">Ver horários</a>
      <div class="barra"></div>
    </div>
  </body>
</html>
